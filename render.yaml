services:
  - type: web
    name: zoning-agent-api
    runtime: docker
    plan: free
    region: ohio
    branch: main
    rootDir: apps/api
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: AUTH_PROVIDER
        value: supabase
      - key: AUTH_REQUIRED
        value: "true"
      - key: AI_PROVIDER
        value: groq
      - key: RAG_PROVIDER
        value: hybrid_local
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: GEMINI_API_KEY
        sync: false
      - key: VECTOR_PROVIDER
        value: qdrant
      # Reindex is an explicit admin action (POST /ingestion/reindex), not a
      # boot-time task. Re-embedding the whole corpus on every deploy blocks the
      # lifespan startup long enough for Render's port scan to time out.
      - key: STARTUP_REINDEX_ENABLED
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        value: https://zoning-agent-platform.vercel.app
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # GROQ_MODEL is dashboard-managed so blueprint re-syncs do not clobber a
      # tuned model choice; defaults to llama-3.3-70b-versatile when unset.
      - key: GROQ_MODEL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ADMIN_ACCESS_KEY
        sync: false
      - key: ADMIN_USER_EMAILS
        sync: false
      - key: SENTRY_DSN
        sync: false
