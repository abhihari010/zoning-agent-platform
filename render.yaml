services:
  - type: web
    name: zoning-agent-api
    runtime: docker
    plan: free
    region: ohio
    branch: main
    rootDir: apps/api
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: APP_ENV
        value: production
      - key: AUTH_PROVIDER
        value: supabase
      - key: AUTH_REQUIRED
        value: "true"
      - key: AI_PROVIDER
        value: deterministic
      - key: RAG_PROVIDER
        value: hybrid_local
      - key: EMBEDDING_PROVIDER
        value: local
      - key: VECTOR_PROVIDER
        value: none
      - key: STARTUP_REINDEX_ENABLED
        value: "true"
      - key: CORS_ALLOW_ORIGINS
        value: https://zoning-agent-platform.vercel.app
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: SUPABASE_PROJECT_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: BETA_ACCESS_KEYS
        sync: false
      - key: ADMIN_ACCESS_KEY
        sync: false
      - key: ADMIN_USER_EMAILS
        sync: false
