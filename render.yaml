services:
  - type: web
    name: zoning-agent-api
    runtime: docker
    plan: free
    region: ohio
    branch: main
    rootDir: apps/api
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AI_PROVIDER
        value: deterministic
      - key: RAG_PROVIDER
        value: hybrid_local
      - key: EMBEDDING_PROVIDER
        value: local
      - key: CORS_ALLOW_ORIGINS
        value: https://zoning-agent-platform.vercel.app
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: BETA_ACCESS_KEY
        sync: false
